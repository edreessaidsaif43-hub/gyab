<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة المنصة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">منصة مشاريع المعلمين</a>
      <nav class="nav-links">
        <a class="nav-link" href="index.html">الرئيسية</a>
        <a class="nav-link active" href="admin.html">لوحة الإدارة</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div id="adminLogin" class="panel">
        <h2>دخول الإدارة</h2>
        <p>لوحة الإدارة خاصة بصاحب الموقع فقط.</p>
        <form id="ownerLoginForm" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
          <input id="ownerPassword" type="password" placeholder="كلمة مرور صاحب الموقع" required>
          <button class="btn btn-dark" type="submit">دخول لوحة الإدارة</button>
        </form>
        <p id="ownerLoginMsg" class="meta"></p>
      </div>

      <div id="adminPanel" style="display:none;">
        <div class="panel" style="margin-top:14px;">
          <button id="adminLogout" class="btn">تسجيل خروج</button>
          <div class="kpi-grid" style="margin-top:12px;">
            <div class="kpi"><div class="num" id="kTotal">0</div><div>إجمالي المشاريع</div></div>
            <div class="kpi"><div class="num" id="kApproved">0</div><div>المعتمدة</div></div>
            <div class="kpi"><div class="num" id="kPending">0</div><div>قيد المراجعة</div></div>
            <div class="kpi"><div class="num" id="kPublic">0</div><div>منشورة للعامة</div></div>
          </div>
        </div>

        <div class="panel" style="margin-top:14px;">
          <h3>إدارة المشاريع</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>المشروع</th><th>المعلم</th><th>التصنيف</th><th>الاعتماد</th><th>الظهور</th><th>المشاهدات</th><th>إجراء</th></tr></thead>
              <tbody id="adminRows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">© 2026 منصة مشاريع المعلمين</footer>
  <script src="js/app.js"></script>
</body>
</html>
